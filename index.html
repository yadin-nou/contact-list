              <div class="speaker"></div>

              <div id="contactlist" hidden onclick="showContact()">

                >
                  <i class="fa-regular fa-address-card fa-2xl"></i>
                </div>
                <div>Contact</div>
              </div>
              <!-- showing contact list information -->
              <div id="displayContact" class="non-display">
                <div
                  class="list d-flex flex-column justify-content-space overflow-auto"
                  id="list"
                >
                  <div class="search">
                    <label
                      for="lbl-contact"
                      class="form-label text-dark lbl-contact"
                      >Contacts</label
                    >
                    <input
                      class="form-control"
                      list="datalistOptions"
                      id="txt-contactlist"
                      placeholder="Search contact..."
                      value=""
                    />
                    <i
                      class="fa-solid fa-magnifying-glass fa-xl"
                      style="color: rgb(2, 18, 8)"
                    ></i>
                    <datalist id="datalistOptions"> </datalist>
                  </div>
                  <div class="text-center">
                    <div class="spinner-border" role="status" id="spinner">
                      <span class="visually-hidden">Loading...</span>
                    </div>
                  </div>
