<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact List Detail</title>
    <link rel="stylesheet" href="./style.css" />
    <!-- Awesome font -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Bootstrap cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="d-flex vh-100 justify-content-center align-items-center">
          <div
            class="d-flex flex-column justify-content-between align-items-center mobile-layout"
          >
            <div class="d-flex justify-content-between top-header">
              <div class="time">12:00</div>
              <div class="speaker"></div>
              <div class="service">
                <i class="fa-solid fa-wifi"></i
                ><i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-battery-three-quarters"></i>
              </div>
            </div>
            <div class="main"></div>
            <div
              class="d-flex justify-content-center gap-4 align-items-center shadow-lg p-3 mb-5 bg-body-tertiary rounded slide"
              id="slide"
            >
              <i class="fa-solid fa-chevron-right"></i>
              <span>Slide to Unlock</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
